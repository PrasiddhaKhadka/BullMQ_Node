services:
  app:
    build: .
    environment:
      - REDIS_HOST=redis     
      - REDIS_PORT=6379
    depends_on:
      - redis                
    restart: unless-stopped  

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:                     
  redis-data: